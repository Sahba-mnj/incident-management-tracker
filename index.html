<!DOCTYPE html>
<html>
<head>
    <title>Incident Management Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Incident Management Tracker</h1>
    <p>Support Operations Dashboard</p>

    <div class="dashboard">

        <div class="card">
            <h2>12</h2>
            <p>Open Incidents</p>
        </div>

        <div class="card">
            <h2>2</h2>
            <p>Critical Incidents</p>
        </div>

        <div class="card">
            <h2>27</h2>
            <p>Resolved This Month</p>
        </div>

    </div>

    <h2>Recent Incidents</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Priority</th>
            <th>Status</th>
        </tr>

        <tr>
            <td>INC-001</td>
            <td>Login Failure</td>
            <td>Critical</td>
            <td>Open</td>
        </tr>

        <tr>
            <td>INC-002</td>
            <td>Payroll Error</td>
            <td>High</td>
            <td>In Progress</td>
        </tr>

        <tr>
            <td>INC-003</td>
            <td>Report Issue</td>
            <td>Medium</td>
            <td>Resolved</td>
        </tr>
    </table>

</body>
</html>
